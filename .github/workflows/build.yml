name: Update Rules

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Daily at 18:20 UTC
    - cron: '20 18 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Test
        run: go test ./...

      # In-process srs compilation — no sing-box binary needed (the version is
      # pinned via go.mod, not a downloaded .deb).
      - name: Generate rule sets
        run: go run ./cmd/generator -config rules/sources.yaml -out rule

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rule/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update rules ($(date -u +%F))"
            git push
          fi
